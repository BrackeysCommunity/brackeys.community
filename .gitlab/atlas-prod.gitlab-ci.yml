atlas-lint-prod:
  stage: atlas-lint
  image: arigaio/atlas:latest
  services:
    - postgres:16
  variables:
    POSTGRES_DB: dev
    POSTGRES_USER: user
    POSTGRES_PASSWORD: pass
  script:
    - atlas migrate lint --env local --dev-url "postgres://user:pass@postgres/dev?sslmode=disable" --dir "file://drizzle" --git-base $CI_MERGE_REQUEST_DIFF_BASE_SHA
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

atlas-push-prod:
  stage: atlas-push
  image: arigaio/atlas:latest
  services:
    - postgres:16
  variables:
    POSTGRES_DB: dev
    POSTGRES_USER: user
    POSTGRES_PASSWORD: pass
  script:
    - atlas migrate push brackeys --env local --dev-url "postgres://user:pass@postgres/dev?sslmode=disable" --dir "file://drizzle"
  rules:
    - if: $CI_COMMIT_BRANCH == 'prod'

atlas-apply-prod:
  stage: atlas-apply
  image: arigaio/atlas:latest
  script:
    - atlas migrate apply --env local --dir "file://drizzle" --url "$PROD_DATABASE_URL" --revisions-schema public
  rules:
    - if: $CI_COMMIT_BRANCH == 'prod'
