chromatic:
  stage: check
  image: oven/bun:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - bun install --frozen-lockfile
  script:
    - bun run build-storybook:test
    # oven/bun:latest has no `node` binary, so the chromatic shim's
    # `#!/usr/bin/env node` shebang fails. Run it with bun instead.
    - bun ./node_modules/.bin/chromatic --storybook-build-dir storybook-static --exit-zero-on-changes --only-changed
  variables:
    GIT_DEPTH: 0
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - src/**/*
        - .storybook/**/*
        - package.json
        - bun.lock
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == 'main'
      changes:
        - src/**/*
        - .storybook/**/*
        - package.json
        - bun.lock
