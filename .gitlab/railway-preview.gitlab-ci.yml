deploy-preview:
  stage: deploy
  image: ghcr.io/railwayapp/cli:latest
  resource_group: preview-${CI_MERGE_REQUEST_IID}
  interruptible: true
  before_script:
    - apk add --no-cache curl jq
  rules:
    - if: $CI_MERGE_REQUEST_IID
  environment:
    name: preview/${CI_MERGE_REQUEST_IID}
    url: https://$PREVIEW_DOMAIN
    on_stop: cleanup-preview
    auto_stop_in: 1 week
  script:
    - export PREVIEW_ENV_NAME="${CI_MERGE_REQUEST_IID}-preview"

    - railway whoami

    # Link to source env, create preview as a copy, then re-link to the preview service
    - railway link --project "$RAILWAY_PROJECT_ID" --environment preview --service mr
    - railway environment new "$PREVIEW_ENV_NAME" --duplicate preview || true
    - sleep 5
    - railway link --project "$RAILWAY_PROJECT_ID" --environment "$PREVIEW_ENV_NAME" --service mr

    # Cancel any in-progress deployment before deploying fresh
    - railway down --yes 2>/dev/null || true

    # Override variables for the preview environment
    - |
      railway variable set \
        RAILWAY_ENVIRONMENT="$PREVIEW_ENV_NAME" \
        NODE_ENV=staging
      if [ -n "$PREVIEW_DATABASE_URL" ]; then
        railway variable set DATABASE_URL="$PREVIEW_DATABASE_URL"
      fi

    # Deploy from the MR branch checkout. Use --detach so the CLI returns
    # immediately after uploading instead of streaming build logs (which can
    # drop and cause spurious non-zero exits). The health check below is the
    # source of truth for whether the preview is actually up.
    - railway up --detach
    - export PREVIEW_DOMAIN=$(railway domain 2>&1 | grep -oE '[a-z0-9-]+\.up\.railway\.app' | head -1)
    - echo "PREVIEW_DOMAIN=${PREVIEW_DOMAIN}" >> deploy.env

    # Wait for deployment to be reachable
    - |
      echo "Waiting for https://${PREVIEW_DOMAIN} to be healthy..."
      HEALTHY=0
      for i in $(seq 1 60); do
        STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://${PREVIEW_DOMAIN}" || true)
        echo "  Attempt $i: HTTP $STATUS"
        if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
          echo "Preview is live!"
          HEALTHY=1
          break
        fi
        sleep 5
      done
      if [ "$HEALTHY" != "1" ]; then
        echo "ERROR: preview did not become healthy within 5 minutes"
        exit 1
      fi
    - echo "Deployed to https://${PREVIEW_DOMAIN}"
    # Post or update MR comment. The deploy has already succeeded by this point,
    # so any failure here (missing token, API error, jq parse error) is logged
    # loudly but must NOT fail the job.
    - |
      post_mr_comment() {
        local marker="<!-- railway-preview -->"
        local body="${marker}\n:rocket: **Preview deployed!**\n\n- [\`${PREVIEW_DOMAIN}\`](https://${PREVIEW_DOMAIN})\n\n---\n*commit: ${CI_COMMIT_SHORT_SHA} by ${GITLAB_USER_NAME}*"
        local notes_url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"

        if [ -z "${GITLAB_API_TOKEN:-}" ]; then
          echo "  ⚠  GITLAB_API_TOKEN is not set — skipping MR comment."
          echo "     Define it as a CI/CD variable (scope: api) to enable preview comments."
          return 0
        fi

        local response http_code
        response=$(curl -sS --write-out "\n%{http_code}" \
          --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          "${notes_url}") || {
          echo "  ⚠  Failed to fetch existing MR notes (curl error). Skipping comment."
          return 0
        }
        http_code=$(printf '%s\n' "$response" | tail -n1)
        response=$(printf '%s\n' "$response" | sed '$d')

        if [ "$http_code" != "200" ]; then
          echo "  ⚠  GitLab API returned HTTP ${http_code} when listing notes."
          echo "     Response: $(printf '%s' "$response" | head -c 300)"
          echo "     Likely causes: token missing 'api' scope, token not exposed to this MR (fork?), or wrong project ID."
          return 0
        fi

        local existing
        existing=$(printf '%s' "$response" \
          | jq -r --arg marker "$marker" \
              'if type=="array" then (.[] | select(.body | contains($marker)) | .id) else empty end' \
          2>/dev/null | head -n1) || existing=""

        local result_code
        if [ -n "$existing" ]; then
          echo "  ↻  Updating existing preview comment (note ${existing})..."
          result_code=$(curl -sS -o /dev/null --write-out "%{http_code}" --request PUT \
            --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            "${notes_url}/${existing}" \
            --data-urlencode "body=$(printf '%b' "$body")") || result_code="curl-error"
        else
          echo "  +  Posting new preview comment..."
          result_code=$(curl -sS -o /dev/null --write-out "%{http_code}" --request POST \
            --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            "${notes_url}" \
            --data-urlencode "body=$(printf '%b' "$body")") || result_code="curl-error"
        fi

        case "$result_code" in
          2??) echo "  ✓  MR comment posted (HTTP ${result_code})." ;;
          *)   echo "  ⚠  MR comment request returned ${result_code}. Deploy is unaffected." ;;
        esac
      }

      echo "──────────────────────────────────────────────"
      echo " Posting MR preview comment"
      echo "──────────────────────────────────────────────"
      post_mr_comment || echo "  ⚠  MR comment step errored unexpectedly — ignoring (deploy already succeeded)."
      echo "──────────────────────────────────────────────"
  artifacts:
    reports:
      dotenv: deploy.env

cleanup-preview:
  stage: deploy
  image: ghcr.io/railwayapp/cli:latest
  rules:
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true
  environment:
    name: preview/${CI_MERGE_REQUEST_IID}
    action: stop
  script:
    - export PREVIEW_ENV_NAME="${CI_MERGE_REQUEST_IID}-preview"
    - railway link --project "$RAILWAY_PROJECT_ID" --environment "$PREVIEW_ENV_NAME" --service mr
    - railway environment delete "$PREVIEW_ENV_NAME" --yes
