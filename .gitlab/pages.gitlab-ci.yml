deploy-pages:
  stage: deploy
  image: oven/bun:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - bun install --frozen-lockfile
  script:
    - bun run build-storybook
  pages:
    publish: storybook-static
  interruptible: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/**/*
        - .storybook/**/*
        - package.json
        - bun.lock
